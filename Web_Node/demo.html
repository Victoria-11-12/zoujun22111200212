<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化界面</title>
    <link rel="stylesheet" href="css/index.css"/>
</head>

<body>
    <header>
    <div class="left-group">
        <div class="header-buttons">
            <button id="searchBtn">🔍 电影搜索</button>
            <button class="msg-btn">留言框</button>
            <button class="AI-btn">AI助手</button>
            <button class="chart-btn">在线绘图</button>
            <button class="logout-btn">登录/退出</button>
        </div>
    </div>
    <h1>电影票房数据分析与可视化系统</h1>

    <div class="showTime">
        <script>
            var t = null;
            t = setTimeout(time, 1000);
            function time() {
                clearTimeout(t);
                let dt = new Date();
                var y = dt.getFullYear();
                var mt = dt.getMonth() + 1;
                var day = dt.getDate();
                var h = dt.getHours();
                var m = dt.getMinutes();
                var s = dt.getSeconds();
                document.querySelector(".showTime").innerHTML = '当前时间：' + y + "年" + mt + "月" + day + "日" + " " + h + "时" + m + "分" + s + "秒";
                t = setTimeout(time, 1000);
            }
        </script>
    </div>
</header>

<!-- 高级搜索 -->
    <div id="searchModal" class="search-modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>高级搜索</h2>
        <div class="search-form">
            <input type="text" id="inputTitle" placeholder="输入电影名...">
            <input type="text" id="inputDirector" placeholder="输入导演名...">
            <input type="text" id="inputActor" placeholder="输入演员名...">
            <input type="number" id="inputYear" placeholder="输入年份 (如 2012)">
            <button id="execSearch">查询</button>
        </div>
        <div id="resultArea" class="result-area">
            </div>
    </div>
</div>

<!-- 留言弹窗 -->
    <div id="messageModal" class="msg-modal-overlay">
    <div class="msg-modal-panel">
<!-- 四角装饰 -->
        <span class="msg-corner tl"></span>
        <span class="msg-corner tr"></span>
        <span class="msg-corner bl"></span>
        <span class="msg-corner br"></span>
<!-- 标题栏 -->
        <div class="msg-modal-header">
        <span class="msg-icon">✉</span>
        <h3>用户留言</h3>
<!-- 分割线 -->
        <span id="closeMessageModal" class="msg-close-btn">✕</span>
        </div>
<!-- 分割线 -->
        <div class="msg-divider">
        <span class="msg-divider-dot"></span>
        </div>
<!-- 内容区 -->
        <div class="msg-body">
        <div class="msg-label">MESSAGE CONTENT</div>
        <textarea id="messageInput" class="msg-textarea" rows="5" placeholder="请输入你的留言内容..."></textarea>
        <!-- textarea:多行文本输入；rows属性指定可见行数； -->
        <div class="msg-footer">
            <span class="msg-tip">💡 留言将被记录并展示在管理后台</span>
            <button id="submitMessage" class="msg-submit-btn">
            <span class="btn-text">提 交 留 言</span>
            </button>
        </div>
        </div>
    </div>
    </div>

    <!-- AI 助手弹窗 -->
    <div id="aiModal" class="modal-overlay" data-modal="ai">
        <div class="modal-panel">
            <!-- 四角装饰 -->
            <span class="corner tl"></span><span class="corner tr"></span>
            <span class="corner bl"></span><span class="corner br"></span>
            <!-- 标题栏 -->
            <div class="modal-header">
                <span class="modal-icon">🤖</span>
                <h3>AI 助手</h3>
                <span class="modal-close-btn" data-close="aiModal">✕</span>
            </div>
            <!-- 分割线 -->
            <div class="modal-divider"><span class="divider-dot"></span></div>
            <!-- 内容区 -->
            <div class="modal-body">
                <!-- AI 回复区 -->
                <div class="chat-container" id="aiChatContainer">
                    <div class="message message-ai">
                        <div class="message-content">你好！我是 AI 助手，有什么可以帮您的吗？</div>
                    </div>
                </div>
                <!-- 输入区 -->
                <div class="input-area">
                    <textarea id="aiInput" class="modal-textarea" rows="3" placeholder="输入您的问题..."></textarea>
                    <button id="sendAiMessage" class="modal-send-btn"><span class="btn-text">发 送</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 在线绘图弹窗 -->
    <div id="chartModal" class="modal-overlay" data-modal="chart">
        <div class="modal-panel modal-panel-lg">
            <!-- 四角装饰 -->
            <span class="corner tl"></span><span class="corner tr"></span>
            <span class="corner bl"></span><span class="corner br"></span>
            <!-- 标题栏 -->
            <div class="modal-header">
                <span class="modal-icon">📊</span>
                <h3>在线绘图</h3>
                <span class="modal-close-btn" data-close="chartModal">✕</span>
            </div>
            <!-- 分割线 -->
            <div class="modal-divider"><span class="divider-dot"></span></div>
            <!-- 内容区 -->
            <div class="modal-body">
                <!-- 绘图区 -->
                <div class="canvas-container" id="chartCanvasContainer">
                    <div class="canvas-placeholder">
                        <p>请描述您要绘制的图表类型和数据</p>
                        <p>例如："绘制一个柱状图，展示 2020-2024 年的票房数据：[100, 150, 200, 250, 300]"</p>
                    </div>
                </div>
                <!-- 输入区 -->
                <div class="input-area">
                    <textarea id="chartInput" class="modal-textarea" rows="3" placeholder="输入图表描述或数据..."></textarea>
                    <button id="generateChart" class="modal-send-btn"><span class="btn-text">生 成 图 表</span></button>
                </div>
            </div>
        </div>
    </div>

    <!--主体部分的盒子-->
    <section class="mainbox">
        <div class="column">
    <div class="panel line" id="pos1">
        <h2 id="title-pos1" >加载中...</h2>
        <div class="chart-filter"></div>
        <div class="chart"></div>
    </div>

    <div class="panel bar" id="pos2">
        <h2 id="title-pos2">加载中...</h2>
        <div class="chart-filter"></div>
        <div class="chart"></div>
    </div>

    <div class="panel scatter" id="pos3">
        <h2 id="title-pos3">加载中...</h2>
        <div class="chart-filter">
        </div>
    <div class="chart"></div>

    </div>
        </div>

        <div class="column"><!--上下两个模块-->
            <div class="no">
                <div class="no-hd">
                    <ul>
                    <li>111111</li>
                    <li>1111111</li>
                    </ul>
                </div>
                <div class="no-bd">
                    <ul>
                        <li>当前电影数目</li>
                        <li>当前最高票房</li>
                    </ul>
                </div>
            </div>
            <div class="map-container">
                <div class="map1"></div>
                <div class="map2"></div>
                <div class="map3"></div>
            </div>
        </div>

        <div class="column">
            <div class="panel bar1" id="pos4">
            <h2 id="title-pos4">加载中...</h2>
            <div class="chart-filter">
        </div>
                <div class="chart"></div>

            </div>
            <div class="panel bar2" id="pos5">
            <h2 id="title-pos5">加载中...</h2>
            <div class="chart-filter">
        </div>
                <div class="chart"></div>

            </div>
             <div class="panel words" id="pos6">
            <h2 id="title-pos6">加载中...</h2>
            <div class="chart-filter">
        </div>
                <div class="chart"></div>

            </div>
        </div>
    </section>
    <script src="js/flexible.js"></script>
    <script src="js/echarts.js"></script>
    <script src="js/echarts-wordcloud.min.js"></script>
    <script src="js/world.js"></script>
    <!-- 图表脚本 -->
    <script src="js/charts_all.js"></script>
    <!-- 可视化界面渲染 -->
    <script src="js/tubiao.js"></script>
    <!-- 搜索脚本 -->
    <script src="js/search.js"></script>
    <!-- 退出登录 -->
    <script>
    // 新增：退出登录功能
    document.querySelector('.logout-btn').addEventListener('click', function() {
        // 清除本地存储的登录凭证
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        // 跳转至登录页面
        window.location.href = 'login.html';
    });
    </script>
    <!-- 留言脚本 -->
    <script src="js/massage.js"></script>
    <script src="js/marked.min.js"></script>
    <!-- AI 脚本 -->
    <script src="js/ai_chat.js"></script>
    <!-- 在线绘图脚本 -->
    <script src="js/ai_chart.js"></script>
</body>
</html>
