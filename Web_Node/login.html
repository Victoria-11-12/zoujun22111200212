<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 电影票房数据分析系统</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="login-container">
        <h2>系统登录</h2>
        
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入账号" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <label class="admin-option">
            <input type="checkbox" id="isAdmin"> 管理员登录
        </label>

        <div class="btn-group">
            <button id="loginBtn">进入系统</button>
            <a href="register.html" class="reg-link">还没有账号？立即注册</a>
        </div>
    </div>

 <script>
    document.getElementById('loginBtn').onclick = function() {
        // 1. 获取输入值
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const isAdminChecked = document.getElementById('isAdmin').checked; // 获取“管理员登录”勾选状态

        // 2. 基础校验
        if (!user || !pass) {
            alert("请输入账号密码");
            return;
        }

        // 3. 发送登录请求
        fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) {
                // --- 核心操作：保存身份凭证到本地 ---
                // 这样跳转到新页面后，系统依然记得你是谁
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', user);
                localStorage.setItem('role', data.role);

                // --- 核心操作：权限分流跳转 ---
                // 如果是管理员且勾选了管理员登录，去后台；否则去大屏
                if (data.role === 'admin' && isAdminChecked) {
                    alert('管理员身份确认，正在进入后台管理系统...');
                    window.location.href = 'admin.html'; 
                } else {
                    alert('登录成功，欢迎回来！');
                    window.location.href = 'demo.html'; 
                }
            } else {
                // 登录失败（如密码错误、用户不存在）
                alert('登录失败：' + data.msg);
            }
        })
        .catch(err => {
            console.error('登录请求异常:', err);
            alert("无法连接到服务器，请检查后端 Node.js 是否正常运行");
        });
    };
</script>
</body>
</html>
