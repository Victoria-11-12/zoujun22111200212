<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 电影票房数据分析系统</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="login-container">
        <h2>系统登录</h2>
        
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入账号" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <div class="login-options">
            <label class="login-option">
                <input type="radio" name="loginType" value="user" checked> 普通用户登录
            </label>
            <label class="login-option">
                <input type="radio" name="loginType" value="admin"> 管理员登录
            </label>
            <label class="login-option">
                <input type="radio" name="loginType" value="analyst"> 分析师登录
            </label>
        </div>

        <div class="btn-group">
            <button id="loginBtn">进入系统</button>
            <a href="register.html" class="reg-link">还没有账号？立即注册</a>
        </div>
    </div>

 <script>
    document.getElementById('loginBtn').onclick = function() {
        // 1. 获取输入值
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const loginType = document.querySelector('input[name="loginType"]:checked').value;

        // 2. 基础校验
        if (!user || !pass) {
            alert("请输入账号密码");
            return;
        }

        // 3. 发送登录请求
        fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) {
                // --- 核心操作：保存身份凭证到本地 ---
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', user);
                localStorage.setItem('role', data.role);

                // --- 核心操作：权限分流跳转 ---
                const userRole = data.role;

                if (loginType === 'admin') {
                    // 管理员登录权限检查
                    if (userRole !== 'admin') {
                        alert('权限不足：您没有管理员权限，无法进入后台管理系统！');
                        return;
                    }
                    alert('管理员身份确认，正在进入后台管理系统...');
                    window.location.href = 'admin.html';
                } else if (loginType === 'analyst') {
                    // 分析师登录权限检查
                    if (userRole !== 'analyst' && userRole !== 'admin') {
                        alert('权限不足：您没有分析师权限，无法进入数据分析平台！');
                        return;
                    }
                    alert('分析师身份确认，正在进入数据分析平台...');
                    window.location.href = 'analyst.html';
                } else {
                    // 普通用户登录
                    alert('登录成功，欢迎回来！');
                    window.location.href = 'demo.html';
                }
            } else {
                // 登录失败（如密码错误、用户不存在）
                alert('登录失败：' + data.msg);
            }
        })
        .catch(err => {
            console.error('登录请求异常:', err);
            alert("无法连接到服务器，请检查后端 Node.js 是否正常运行");
        });
    };
</script>
</body>
</html>
