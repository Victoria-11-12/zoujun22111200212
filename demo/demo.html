    <h1>电影票房数据分析与可视化系统</h1>

    <div class="showTime">
        <script>
            var t = null;
            t = setTimeout(time, 1000);
            function time() {
                clearTimeout(t);
                let dt = new Date();
                var y = dt.getFullYear();
                var mt = dt.getMonth() + 1;
                var day = dt.getDate();
                var h = dt.getHours();
                var m = dt.getMinutes();
                var s = dt.getSeconds();
                document.querySelector(".showTime").innerHTML = '当前时间：' + y + "年" + mt + "月" + day + "日" + " " + h + "时" + m + "分" + s + "秒";
                t = setTimeout(time, 1000);
            }
        </script>
    </div>
</header>

<!-- 高级搜索 -->
    <div id="searchModal" class="search-modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>高级搜索</h2>
        <div class="search-form">
            <input type="text" id="inputTitle" placeholder="输入电影名...">
            <input type="text" id="inputDirector" placeholder="输入导演名...">
            <input type="text" id="inputActor" placeholder="输入演员名...">
            <input type="number" id="inputYear" placeholder="输入年份 (如 2012)">

        </div>

            </div>
    </div>
</div>

<!-- 留言弹窗 -->

        <div class="msg-footer">

    <!-- 退出登录 -->
    <script>
    // 新增：退出登录功能
    document.querySelector('.logout-btn').addEventListener('click', function() {
        // 清除本地存储的登录凭证
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        // 跳转至登录页面
        window.location.href = 'login.html';
    });
    </script>
    <!-- 词典 -->
    <script>
    // 词典按钮跳转到有道翻译（新窗口打开）
    document.querySelector('.dict-btn').addEventListener('click', function() {
        const username = localStorage.getItem('username');
        if (!username) {
            alert('请先登录后再使用词典功能');
            return;
        }
        window.open('https://fanyi.youdao.com/', '_blank');
    });
    </script>
