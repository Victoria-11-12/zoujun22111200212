[pytest]
testpaths = tests                  # 测试文件搜索路径
python_files = test_*.py           # 测试文件命名规则
python_classes = Test*             # 测试类命名规则
python_functions = test_*          # 测试函数命名规则
addopts =
    -v                              # 详细模式：显示每个测试的名称和结果
    --tb=short                      # 简短回溯：失败时显示精简的错误堆栈
    --strict-markers                # 严格标记：禁止未定义的标记，防止拼写错误
    --html=test_results/reports/report.html  # HTML报告：指定报告输出路径
    --self-contained-html           # 独立HTML：将CSS嵌入文件，生成单个可分享的文件
    --cov=app                       # 覆盖率：测试app目录
    --cov-report=html:test_results/coverage  # 覆盖率HTML报告
markers =                          # 测试标记定义
    unit: 单元测试                 # 标记：单元测试
    integration: 集成测试          # 标记：集成测试
    e2e: 端到端测试                # 标记：端到端测试
asyncio_mode = auto                # 异步测试模式：自动识别
log_file = test_results/logs/test.log  # 日志文件路径
log_file_level = DEBUG             # 日志文件级别
log_file_format = %(asctime)s [%(levelname)8s] %(message)s  # 日志文件格式
