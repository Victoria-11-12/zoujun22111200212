# ========================================
# LLM Agent 数据分析平台 - Docker Compose 配置
# 当前版本支持: Node.js + Flask + FastAPI + MySQL
# 后续扩展: RAG + 多模态
# ========================================

version: '3.8'

services:
  # -------------------- MySQL 数据库服务 --------------------
  mysql:
    image: mysql:8.0
    container_name: movie_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-123456}
      MYSQL_DATABASE: ${DB_NAME:-movie_db}
      MYSQL_USER: ${DB_USER_READONLY:-readonly_user}
      MYSQL_PASSWORD: ${DB_PASS_READONLY:-readonly_pass_123}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./movie_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - movie_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # -------------------- Node.js 业务服务 --------------------
  web_node:
    build:
      context: ..
      dockerfile: 配置文档/docker/Dockerfile.nodejs
    container_name: movie_web_node
    restart: unless-stopped
    ports:
      - "${NODE_PORT:-3000}:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-movie_db}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-123456}
      DB_USER_READONLY: ${DB_USER_READONLY:-readonly_user}
      DB_PASS_READONLY: ${DB_PASS_READONLY:-readonly_pass_123}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24}
      API_KEY: ${API_KEY:-}
      API_BASE: ${API_BASE:-https://api.deepseek.com/v1}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
    volumes:
      - ../Web_Node:/app:ro
      - /app/node_modules
    networks:
      - movie_network
    depends_on:
      mysql:
        condition: service_healthy

  # -------------------- Flask 算法服务 --------------------
  flask:
    build:
      context: ..
      dockerfile: 配置文档/docker/Dockerfile.flask
    container_name: movie_flask
    restart: unless-stopped
    ports:
      - "${FLASK_PORT:-5000}:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-movie_db}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-123456}
      DB_USER_READONLY: ${DB_USER_READONLY:-readonly_user}
      DB_PASS_READONLY: ${DB_PASS_READONLY:-readonly_pass_123}
    volumes:
      - ../Flask:/app:ro
    networks:
      - movie_network
    depends_on:
      mysql:
        condition: service_healthy

  # -------------------- FastAPI Agent 服务 --------------------
  fastapi:
    build:
      context: ..
      dockerfile: 配置文档/docker/Dockerfile.fastapi
    container_name: movie_fastapi
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-movie_db}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-123456}
      DB_USER_READONLY: ${DB_USER_READONLY:-readonly_user}
      DB_PASS_READONLY: ${DB_PASS_READONLY:-readonly_pass_123}
      DB_USER_ANALYST: ${DB_USER_ANALYST:-analyst}
      DB_PASS_ANALYST: ${DB_PASS_ANALYST:-123456}
      API_KEY: ${API_KEY:-}
      API_BASE: ${API_BASE:-https://api.deepseek.com/v1}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      EVAL_API_KEY: ${EVAL_API_KEY:-}
      EVAL_MODEL_NAME: ${EVAL_MODEL_NAME:-deepseek-reasoner}
      DOCKER_IMAGE: ${DOCKER_IMAGE:-pyecharts-sandbox}
      DOCKER_MEMORY_LIMIT: ${DOCKER_MEMORY_LIMIT:-256}
      DOCKER_TIMEOUT: ${DOCKER_TIMEOUT:-30}
    volumes:
      - ../fastapi:/app:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - movie_network
    depends_on:
      mysql:
        condition: service_healthy

  # -------------------- PyEcharts 沙箱服务（可选）--------------------
  pyecharts-sandbox:
    build:
      context: ..
      dockerfile: fastapi/Dockerfile
    container_name: movie_pyecharts_sandbox
    restart: unless-stopped
    image: pyecharts-sandbox:latest
    networks:
      - movie_network
    profiles:
      - sandbox

# -------------------- 数据卷 --------------------
volumes:
  mysql_data:
    driver: local

# -------------------- 网络配置 --------------------
networks:
  movie_network:
    driver: bridge
